name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: go mod download
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /tmp/devflow ./cmd/devflow
      - run: /tmp/devflow version
