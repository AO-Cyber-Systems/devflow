version: "1"

metadata:
  name: "fastapi-starter"
  display_name: "FastAPI Starter"
  description: "Modern Python API with FastAPI, async support, and optional database"
  category: "api"
  icon: "fastapi"
  author: "DevFlow"
  version: "1.0.0"
  tags: ["python", "fastapi", "api", "async"]

required_tools:
  - python
  - git

recommended_tools:
  - docker

wizard:
  steps:
    - id: "basics"
      title: "Project Basics"
      description: "Configure basic project settings"
      fields:
        - id: "project_name"
          type: "text"
          label: "Project Name"
          required: true
          placeholder: "my-api"
          validation: "^[a-z][a-z0-9_]*$"
          validation_message: "Name must be lowercase, start with a letter, and contain only letters, numbers, and underscores"
        - id: "project_path"
          type: "directory"
          label: "Project Location"
          required: true
        - id: "python_version"
          type: "select"
          label: "Python Version"
          default: "3.11"
          options:
            - value: "3.12"
              label: "Python 3.12"
            - value: "3.11"
              label: "Python 3.11"
            - value: "3.10"
              label: "Python 3.10"

    - id: "features"
      title: "Features"
      fields:
        - id: "database"
          type: "select"
          label: "Database"
          default: "none"
          options:
            - value: "postgres"
              label: "PostgreSQL (SQLAlchemy)"
              description: "Async PostgreSQL with SQLAlchemy 2.0"
            - value: "sqlite"
              label: "SQLite"
              description: "Simple file-based database"
            - value: "none"
              label: "None"
        - id: "use_alembic"
          type: "checkbox"
          label: "Include Alembic migrations"
          default: "true"
        - id: "use_docker"
          type: "checkbox"
          label: "Include Docker configuration"
          default: "true"

files:
  - source: "static/.gitignore"
    destination: ".gitignore"
  - source: "static/.env.example"
    destination: ".env.example"
  - source: "templates/pyproject.toml.j2"
    destination: "pyproject.toml"
    template: true
  - source: "templates/devflow.yml.j2"
    destination: "devflow.yml"
    template: true
  - source: "src/app/"
    destination: "src/{{ project_name }}/"
    recursive: true
    template: true
  - source: "templates/Dockerfile.j2"
    destination: "Dockerfile"
    template: true
    condition: "use_docker == 'true'"
  - source: "templates/docker-compose.yml.j2"
    destination: "docker-compose.yml"
    template: true
    condition: "use_docker == 'true'"

hooks:
  - name: "Create virtual environment"
    command: "python3 -m venv .venv"
  - name: "Install dependencies"
    command: ".venv/bin/pip install -e '.[dev]'"
  - name: "Initialize git repository"
    command: "git init"
  - name: "Create initial commit"
    command: "git add . && git commit -m 'Initial commit from DevFlow template'"
