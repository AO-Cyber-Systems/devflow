version: "1"

metadata:
  name: "sveltekit-app"
  display_name: "SvelteKit App"
  description: "Modern web app with SvelteKit, TypeScript, and Tailwind CSS"
  category: "web"
  icon: "svelte"
  author: "DevFlow"
  version: "1.0.0"
  tags: ["svelte", "sveltekit", "typescript", "tailwind"]

required_tools:
  - nodejs
  - git

recommended_tools:
  - docker

wizard:
  steps:
    - id: "basics"
      title: "Project Basics"
      fields:
        - id: "project_name"
          type: "text"
          label: "Project Name"
          required: true
          placeholder: "my-sveltekit-app"
          validation: "^[a-z][a-z0-9-]*$"
          validation_message: "Name must be lowercase with letters, numbers, and hyphens"
        - id: "project_path"
          type: "directory"
          label: "Project Location"
          required: true

    - id: "features"
      title: "Features"
      fields:
        - id: "adapter"
          type: "select"
          label: "Deployment Adapter"
          default: "auto"
          options:
            - value: "auto"
              label: "Auto"
              description: "Automatically detect platform"
            - value: "node"
              label: "Node.js"
              description: "Deploy to Node.js server"
            - value: "static"
              label: "Static"
              description: "Pre-render static site"
            - value: "vercel"
              label: "Vercel"
        - id: "use_docker"
          type: "checkbox"
          label: "Include Docker configuration"
          default: "true"

files:
  - source: "static/.gitignore"
    destination: ".gitignore"
  - source: "static/.env.example"
    destination: ".env.example"
  - source: "templates/package.json.j2"
    destination: "package.json"
    template: true
  - source: "templates/svelte.config.js.j2"
    destination: "svelte.config.js"
    template: true
  - source: "templates/vite.config.ts.j2"
    destination: "vite.config.ts"
    template: true
  - source: "templates/tsconfig.json.j2"
    destination: "tsconfig.json"
    template: true
  - source: "templates/tailwind.config.js.j2"
    destination: "tailwind.config.js"
    template: true
  - source: "templates/postcss.config.js.j2"
    destination: "postcss.config.js"
    template: true
  - source: "templates/devflow.yml.j2"
    destination: "devflow.yml"
    template: true
  - source: "src/"
    destination: "src/"
    recursive: true
  - source: "templates/Dockerfile.j2"
    destination: "Dockerfile"
    template: true
    condition: "use_docker == 'true'"

hooks:
  - name: "Install dependencies"
    command: "npm install"
  - name: "Initialize git repository"
    command: "git init"
  - name: "Create initial commit"
    command: "git add . && git commit -m 'Initial commit from DevFlow template'"
