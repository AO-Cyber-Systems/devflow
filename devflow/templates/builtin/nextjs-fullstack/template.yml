version: "1"

metadata:
  name: "nextjs-fullstack"
  display_name: "Next.js Fullstack App"
  description: "Next.js 14 with TypeScript, Tailwind CSS, and optional database integration"
  category: "fullstack"
  icon: "nextjs"
  author: "DevFlow"
  version: "1.0.0"
  tags: ["nextjs", "typescript", "react", "tailwind"]

required_tools:
  - nodejs
  - git

recommended_tools:
  - docker

wizard:
  steps:
    - id: "basics"
      title: "Project Basics"
      description: "Configure basic project settings"
      fields:
        - id: "project_name"
          type: "text"
          label: "Project Name"
          required: true
          placeholder: "my-nextjs-app"
          validation: "^[a-z][a-z0-9-]*$"
          validation_message: "Name must be lowercase, start with a letter, and contain only letters, numbers, and hyphens"
        - id: "project_path"
          type: "directory"
          label: "Project Location"
          required: true
          description: "Directory where the project will be created"

    - id: "features"
      title: "Features"
      description: "Select features to include in your project"
      fields:
        - id: "database"
          type: "select"
          label: "Database"
          default: "none"
          options:
            - value: "supabase"
              label: "Supabase"
              description: "PostgreSQL with authentication and real-time"
            - value: "prisma"
              label: "Prisma"
              description: "Type-safe ORM with PostgreSQL"
            - value: "none"
              label: "None"
              description: "No database integration"
        - id: "auth"
          type: "select"
          label: "Authentication"
          default: "none"
          options:
            - value: "nextauth"
              label: "NextAuth.js"
              description: "Flexible authentication for Next.js"
            - value: "supabase"
              label: "Supabase Auth"
              description: "Built-in auth with Supabase"
            - value: "none"
              label: "None"
        - id: "use_docker"
          type: "checkbox"
          label: "Include Docker configuration"
          default: "true"

files:
  - source: "static/.gitignore"
    destination: ".gitignore"
  - source: "static/.env.example"
    destination: ".env.example"
  - source: "templates/package.json.j2"
    destination: "package.json"
    template: true
  - source: "templates/tsconfig.json.j2"
    destination: "tsconfig.json"
    template: true
  - source: "templates/next.config.js.j2"
    destination: "next.config.js"
    template: true
  - source: "templates/tailwind.config.js.j2"
    destination: "tailwind.config.js"
    template: true
  - source: "templates/postcss.config.js.j2"
    destination: "postcss.config.js"
    template: true
  - source: "templates/devflow.yml.j2"
    destination: "devflow.yml"
    template: true
  - source: "src/"
    destination: "src/"
    recursive: true
  - source: "templates/Dockerfile.j2"
    destination: "Dockerfile"
    template: true
    condition: "use_docker == 'true'"
  - source: "templates/docker-compose.yml.j2"
    destination: "docker-compose.yml"
    template: true
    condition: "use_docker == 'true'"

hooks:
  - name: "Install dependencies"
    command: "npm install"
  - name: "Initialize git repository"
    command: "git init"
  - name: "Create initial commit"
    command: "git add . && git commit -m 'Initial commit from DevFlow template'"
